server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  # Astro builds directory-style routes: /blog/post/ -> /blog/post/index.html
  # Serve the directory's index.html directly (via $uri/index.html) instead of
  # $uri/, which would 301-redirect to add a trailing slash on every clean URL.
  location / {
    try_files $uri $uri/index.html $uri.html /404.html;
  }

  # Cache immutable build assets aggressively
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
